<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <defs>
        <linearGradient id="albumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="200" fill="#f8f9fa"/>
    <circle cx="100" cy="100" r="90" fill="url(#albumGrad)"/>
    <!-- Concentric circles for vinyl effect -->
    <circle cx="100" cy="100" r="85" fill="none" stroke="#444" stroke-width="1" opacity="0.5"/>
    <circle cx="100" cy="100" r="75" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>
    <circle cx="100" cy="100" r="65" fill="none" stroke="#444" stroke-width="1" opacity="0.3"/>
    <circle cx="100" cy="100" r="55" fill="none" stroke="#444" stroke-width="1" opacity="0.2"/>
    <circle cx="100" cy="100" r="30" fill="#FF6600"/>
    <circle cx="100" cy="100" r="8" fill="#fff"/>
</svg>