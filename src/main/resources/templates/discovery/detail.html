
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    
    <div th:replace="~{fragments/layout :: head('Song Details - RevPlay')}"></div>
</head>

<body>

    
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mb-5 mt-5">
        <div class="row align-items-center bg-light p-4 rounded shadow-sm border border-light">
            <div class="col-md-4 text-center">
                
                <img th:if="${song.coverArtUrl != null}" th:src="@{${song.coverArtUrl}}" alt="Album Cover"
                    class="img-fluid rounded border border-light shadow" style="max-height: 350px;">
                <img th:unless="${song.coverArtUrl != null}" th:src="@{/images/default-song.svg}"
                    alt="Default Song Cover" class="img-fluid rounded border border-light shadow"
                    style="max-height: 350px;">
            </div>
            <div class="col-md-8 ps-md-5 mt-4 mt-md-0">
                
                <h1 class="text-primary fw-bold mb-1" th:text="${song.title}">Song Title</h1>
                <h4 class="text-muted mb-3">by
                    <a th:href="@{/artists/{username}(username=${song.artist.username})}"
                        th:text="${song.artist.displayName}" class="text-decoration-none text-muted">Artist Name</a>
                </h4>

                <div class="mb-4">
                    <span class="badge bg-secondary me-2 fs-6" th:text="${song.genre}">Genre</span>
                    
                    <span class="badge bg-info text-dark fs-6"
                        th:text="${song.duration / 60} + ':' + ${T(java.lang.String).format('%02d', song.duration % 60)}">00:00</span>
                </div>

                <hr class="my-4">

                <div class="row g-3">
                    <div class="col-sm-6">
                        <p class="mb-1 text-muted text-uppercase small">Release Date</p>
                        <p class="fw-medium" th:text="${song.releaseDate != null ? song.releaseDate : 'Unknown'}">
                            YYYY-MM-DD</p>
                    </div>
                    <div class="col-sm-6">
                        <p class="mb-1 text-muted text-uppercase small">Total Plays</p>
                        <p class="fw-medium" th:text="${song.playCount}">0</p>
                    </div>
                </div>

                
                <div th:replace="~{fragments/social-share :: share('/song/' + ${song.id}, ${song.title})}"></div>

                
                <div class="mt-4 pt-3 d-flex gap-3 align-items-center flex-wrap" sec:authorize="isAuthenticated()">
                    
                    <button class="btn btn-outline-danger btn-lg like-btn" th:data-id="${song.id}"
                        th:id="'like-btn-' + ${song.id}">
                        <span class="like-text">Like Track 🤍</span>
                    </button>

                    
                    <div class="dropdown" th:if="${userPlaylists != null && !#lists.isEmpty(userPlaylists)}">
                        <button class="btn btn-outline-secondary btn-lg dropdown-toggle" type="button"
                            id="playlistDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            Add to Playlist...
                        </button>
                        <ul class="dropdown-menu shadow-sm" aria-labelledby="playlistDropdown">
                            <li th:each="p : ${userPlaylists}">
                                
                                <button class="dropdown-item add-playlist-btn" th:data-playlist="${p.id}"
                                    th:data-song="${song.id}" th:text="${p.name}">Playlist</button>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="mt-4 pt-3 d-flex gap-3">
                    
                    <button class="btn btn-primary btn-lg fw-bold px-4 shadow" th:if="${song.audioUrl != null}"
                        th:data-song-id="${song.id}" th:data-audio-url="${song.audioUrl}" th:data-title="${song.title}"
                        th:data-artist="${song.artist != null ? (song.artist.displayName ?: song.artist.username) : 'Unknown Artist'}"
                        th:data-cover="${song.coverArtUrl != null ? song.coverArtUrl : '/images/default-song.svg'}"
                        onclick="playGlobalAudio(this.getAttribute('data-song-id'), this.getAttribute('data-audio-url'), this.getAttribute('data-title'), this.getAttribute('data-artist'), this.getAttribute('data-cover'))">
                        ▶ Play Track
                    </button>
                    <button class="btn btn-primary btn-lg fw-bold px-4 shadow" th:unless="${song.audioUrl != null}"
                        disabled>No Audio File</button>
                    <a th:if="${song.albumId != null}" th:href="@{/album/{id}(id=${song.albumId})}"
                        class="btn btn-outline-primary btn-lg">View Album</a>
                    <a th:href="@{/discovery}" class="btn btn-outline-secondary btn-lg">Back to Discovery</a>
                </div>
            </div>
        </div>
    </div>

    
    <div th:replace="~{fragments/layout :: footer}"></div>

    
    <div th:replace="~{fragments/social-share :: share-scripts}"></div>

    <script th:inline="javascript">
        
        document.addEventListener('DOMContentLoaded', function () {
            
            const likeBtn = document.querySelector('.like-btn');
            if (likeBtn) {
                const songId = likeBtn.getAttribute('data-id');
                const textSpan = likeBtn.querySelector('.like-text');

                
                fetch(`/library/like/status/${songId}`)
                    .then(res => res.json())
                    .then(isLiked => {
                        if (isLiked) {
                            textSpan.innerText = 'Unlike Track 💔';
                            likeBtn.classList.replace('btn-outline-danger', 'btn-danger');
                        }
                    });

                
                likeBtn.addEventListener('click', function () {
                    fetch(`/library/like/${songId}`, { method: 'POST' })
                        .then(res => res.json())
                        .then(isLiked => {
                            if (isLiked) {
                                textSpan.innerText = 'Unlike Track 💔';
                                likeBtn.classList.replace('btn-outline-danger', 'btn-danger');
                            } else {
                                textSpan.innerText = 'Like Track 🤍';
                                likeBtn.classList.replace('btn-danger', 'btn-outline-danger');
                            }
                        });
                });
            }

            
            const addBtns = document.querySelectorAll('.add-playlist-btn');
            addBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    const pId = this.getAttribute('data-playlist');
                    const sId = this.getAttribute('data-song');
                    fetch(`/library/api/playlists/${pId}/add/${sId}`, { method: 'POST' })
                        .then(res => {
                            if (res.ok) alert('Successfully added to your playlist!');
                        });
                });
            });
        });
    </script>
</body>

</html>
