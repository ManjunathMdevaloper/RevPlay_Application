
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    
    <div th:replace="~{fragments/layout :: head('Forgot Password - RevPlay')}"></div>
</head>

<body class="auth-body">
    <div class="container">
        <div class="row w-100 justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card border-0 auth-card overflow-hidden">
                    <div class="card-body p-3 p-md-4">

                        <div class="text-center mb-3">
                            
                            <img th:src="@{/images/logo.png}" alt="RevPlay Logo" class="mb-3"
                                style="height: 80px; width: auto;">
                            <h2 class="fw-bold mb-1" style="color: var(--primary-color);">Account Recovery</h2>
                            <p class="text-muted small">Verify your identity to reset password</p>
                        </div>

                        
                        <div th:if="${error}" class="alert alert-danger py-2 text-center small border-0 shadow-sm mb-3"
                            th:text="${error}"></div>
                        <div th:if="${message}"
                            class="alert alert-success py-2 text-center small border-0 shadow-sm mb-3"
                            th:text="${message}"></div>

                        
                        <form th:action="@{/forgot-password}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-bold small text-muted">Username or Email</label>
                                
                                <input type="text" id="username" name="username"
                                    class="form-control rounded-2 border-light shadow-sm"
                                    placeholder="Enter your username or email" required autofocus />
                            </div>
                            <div class="d-grid gap-2 mt-3">
                                <button type="submit" class="btn btn-primary btn-lg rounded-2 fw-bold shadow">Verify
                                    Account</button>
                                
                                <a th:href="@{/login}"
                                    class="btn btn-link text-muted text-decoration-none small fw-bold">Back to Sign
                                    In</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
