<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: head('Set New Password - RevPlay')}"></div>
</head>

<body class="auth-body">
    <div class="container">
        <div class="row w-100 justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card border-0 auth-card overflow-hidden">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <img th:src="@{/images/logo.png}" alt="RevPlay Logo" class="mb-3"
                                style="height: 80px; width: auto;">
                            <h2 class="fw-bold mb-1" style="color: var(--primary-color);">Secure Your Account</h2>
                            
                            <p class="text-muted small">Account verified for: <strong th:text="${username}"
                                    class="text-dark">User</strong></p>
                        </div>

                        
                        <div th:if="${error}" class="alert alert-danger py-2 text-center small border-0 shadow-sm mb-4"
                            th:text="${error}"></div>

                        <form th:action="@{/reset-password}" method="post">
                            
                            <input type="hidden" name="username" th:value="${username}" />

                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold small text-muted">New Password</label>
                                <input type="password" id="password" name="password"
                                    class="form-control rounded-2 border-light shadow-sm"
                                    placeholder="Minimum 6 characters" required autofocus
                                    pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z0-9]).{6,}"
                                    title="Password must be at least 6 characters long and include at least one letter, one number, and one special character." />
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-bold small text-muted">Confirm New
                                    Password</label>
                                <input type="password" id="confirmPassword" name="confirmPassword"
                                    class="form-control rounded-2 border-light shadow-sm"
                                    placeholder="Repeat your password" required
                                    pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z0-9]).{6,}"
                                    title="Password must be at least 6 characters long and include at least one letter, one number, and one special character." />
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg rounded-2 fw-bold shadow">Update
                                    Password</button>
                                <a th:href="@{/login}"
                                    class="btn btn-link text-muted text-decoration-none small fw-bold">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
