

<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    
    <div th:replace="~{fragments/layout :: head('Register - RevPlay')}"></div>
</head>

<body class="auth-body">
    <div class="container">
        <div class="row w-100 justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card border-0 auth-card overflow-hidden">
                    <div class="card-body p-3 p-md-4">

                        <div class="text-center mb-3">
                            
                            <img th:src="@{/images/logo.png}" alt="RevPlay Logo" class="mb-3"
                                style="height: 80px; width: auto;">
                            <h2 class="fw-bold mb-1" style="color: var(--primary-color);">Create Account</h2>
                            <p class="text-muted small">Join the RevPlay music community</p>
                        </div>

                        
                        <form method="post" th:action="@{/register/save}" th:object="${user}">
                            <div class="row g-2 mb-2">
                                <div class="col-md-6">
                                    <label for="username" class="form-label fw-bold small text-muted">Username</label>
                                    
                                    <input type="text" id="username" th:field="*{username}"
                                        class="form-control rounded-2 border-light shadow-sm" placeholder="your_handle"
                                        required />
                                    
                                    
                                    <p th:if="${#fields.hasErrors('username')}" class="text-danger small mt-1"
                                        th:errors="*{username}"></p>
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label fw-bold small text-muted">Email Address</label>
                                    
                                    <input type="email" id="email" th:field="*{email}"
                                        class="form-control rounded-2 border-light shadow-sm"
                                        placeholder="name@example.com" required />
                                    <p th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1"
                                        th:errors="*{email}"></p>
                                </div>
                            </div>

                            <div class="row g-2 mb-2">
                                <div class="col-md-6">
                                    <label for="securityQuestion" class="form-label fw-bold small text-muted">Security
                                        Question</label>
                                    <input type="text" id="securityQuestion" th:field="*{securityQuestion}"
                                        class="form-control rounded-2 border-light shadow-sm"
                                        placeholder="E.g., What is your mother's maiden name?" required />
                                    <p th:if="${#fields.hasErrors('securityQuestion')}" class="text-danger small mt-1"
                                        th:errors="*{securityQuestion}"></p>
                                </div>
                                <div class="col-md-6">
                                    <label for="securityAnswer" class="form-label fw-bold small text-muted">Security
                                        Answer</label>
                                    <input type="text" id="securityAnswer" th:field="*{securityAnswer}"
                                        class="form-control rounded-2 border-light shadow-sm" placeholder="Answer"
                                        required />
                                    <p th:if="${#fields.hasErrors('securityAnswer')}" class="text-danger small mt-1"
                                        th:errors="*{securityAnswer}"></p>
                                </div>
                            </div>

                            <div class="row g-2 mb-2">
                                <div class="col-md-6">
                                    <label for="securityHint" class="form-label fw-bold small text-muted">Security Hint
                                        (Optional)</label>
                                    <input type="text" id="securityHint" th:field="*{securityHint}"
                                        class="form-control rounded-2 border-light shadow-sm"
                                        placeholder="Hint to help you remember" />
                                </div>
                                <div class="col-md-6">
                                    <label for="password" class="form-label fw-bold small text-muted">
                                        Password <span style="font-size: 0.65rem; font-weight: normal; color: #888;">(6+
                                            chars: 1 letter, 1 num, 1 special)</span>
                                    </label>
                                    
                                    <input type="password" id="password" th:field="*{password}"
                                        class="form-control rounded-2 border-light shadow-sm" placeholder="••••••••"
                                        required pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z0-9]).{6,}"
                                        title="Password must be at least 6 characters long and include at least one letter, one number, and one special character." />
                                    <p th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1"
                                        th:errors="*{password}"></p>
                                </div>
                            </div>
                            <div
                                class="mb-2 form-check bg-light p-2 rounded-4 d-flex align-items-center justify-content-center gap-2 border border-white">
                                
                                <input type="checkbox" class="form-check-input mt-0 ms-0" id="isArtist"
                                    th:field="*{artist}">
                                <label class="form-check-label fw-bold small text-dark" for="isArtist">I am an Artist /
                                    Musician</label>
                            </div>
                            <div class="d-grid shadow-sm mt-3">
                                <button type="submit" class="btn btn-primary btn-lg rounded-2 fw-bold">Register</button>
                            </div>
                            <div class="text-center mt-3">
                                <span class="small text-muted">Already have an account?</span>
                                
                                <a th:href="@{/login}" class="small fw-bold text-decoration-none ms-1"
                                    style="color: var(--primary-color);">Sign In</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
