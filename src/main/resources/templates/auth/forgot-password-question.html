<!-- 
  Forgot Password Question View Template
  This page asks the user their security question.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: head('Security Question - RevPlay')}"></div>
</head>

<body class="auth-body">
    <div class="container">
        <div class="row w-100 justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card border-0 auth-card overflow-hidden">
                    <div class="card-body p-3 p-md-4">

                        <div class="text-center mb-3">
                            <img th:src="@{/images/logo.png}" alt="RevPlay Logo" class="mb-3"
                                style="height: 80px; width: auto;">
                            <h2 class="fw-bold mb-1" style="color: var(--primary-color);">Security Question</h2>
                            <p class="text-muted small">Answer your security question to continue</p>
                        </div>

                        <div th:if="${error}" class="alert alert-danger py-2 text-center small border-0 shadow-sm mb-3"
                            th:text="${error}"></div>

                        <form th:action="@{/verify-security-question}" method="post">
                            <input type="hidden" name="username" th:value="${username}" />

                            <div class="mb-3">
                                <label class="form-label fw-bold small text-muted">Question</label>
                                <div class="p-3 bg-light rounded text-dark fw-medium border"
                                    th:text="${securityQuestion}"></div>
                                <div th:if="${securityHint}" class="mt-2 text-muted small">
                                    <strong>Hint: </strong> <span th:text="${securityHint}"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="securityAnswer" class="form-label fw-bold small text-muted">Your
                                    Answer</label>
                                <input type="text" id="securityAnswer" name="securityAnswer"
                                    class="form-control rounded-2 border-light shadow-sm"
                                    placeholder="Enter your answer" required autofocus />
                            </div>

                            <div class="d-grid gap-2 mt-3">
                                <button type="submit" class="btn btn-primary btn-lg rounded-2 fw-bold shadow">Submit
                                    Answer</button>
                                <a th:href="@{/login}"
                                    class="btn btn-link text-muted text-decoration-none small fw-bold">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
